name: Release Hai Shower (disabled)

# The canonical release pipeline lives in gitcak/hai_api's
# .github/workflows/release.yml. That workflow builds hai_shower.zip with the
# correct HACS zip_release layout (integration files at the zip root), syncs
# this mirror repo, and creates the public GitHub release with the zip
# attached. This mirrored workflow previously ran on tag push and uploaded a
# second zip (hai_shower-X.Y.Z.zip) with the wrong wrapped layout, which
# caused "Integration 'hai_shower' not found" for users who manually grabbed
# that asset. It is now a no-op and only runs via manual workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Release pipeline lives in hai_api
        run: |
          echo "Release builds happen in gitcak/hai_api."
          echo "Do not publish release assets from this mirror."
